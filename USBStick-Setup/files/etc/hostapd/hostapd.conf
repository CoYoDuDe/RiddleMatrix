# Template: wird durch /usr/local/bin/bootlocal.sh via /etc/usbstick/public_ap.env befüllt
interface=@WIFI_IFACE@
driver=nl80211
ssid=@SSID@
country_code=DE
ieee80211d=1
hw_mode=g
channel=6
ieee80211n=1
wmm_enabled=1
auth_algs=1
wpa=2
wpa_key_mgmt=WPA-PSK
rsn_pairwise=CCMP
wpa_passphrase=@WPA_PASSPHRASE@
