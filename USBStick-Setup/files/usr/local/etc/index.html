  <script type="text/javascript">
    var gk_isXlsx = false;
    var gk_xlsxFileLookup = {};
    var gk_fileData = {};
    function filledCell(cell) {
      return cell !== '' && cell != null;
    }
    function loadFileData(filename) {
      if (gk_isXlsx && gk_xlsxFileLookup[filename]) {
        try {
          var workbook = XLSX.read(gk_fileData[filename], { type: 'base64' });
          var firstSheetName = workbook.SheetNames[0];
          var worksheet = workbook.Sheets[firstSheetName];

          // Convert sheet to JSON to filter blank rows
          var jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, blankrows: false, defval: '' });
          // Filter out blank rows (rows where all cells are empty, null, or undefined)
          var filteredData = jsonData.filter(row => row.some(filledCell));

          // Heuristic to find the header row by ignoring rows with fewer filled cells than the next row
          var headerRowIndex = jsonData.findIndex((row, index) =>
            row.filter(filledCell).length >= jsonData[index + 1]?.filter(filledCell).length
          );
          // Fallback
          if (headerRowIndex === -1 || headerRowIndex > 25) {
            headerRowIndex = 0;
          }

          // Convert filtered JSON back to CSV
          var csv = XLSX.utils.aoa_to_sheet(filteredData.slice(headerRowIndex)); // Create a new sheet from filtered array of arrays
          csv = XLSX.utils.sheet_to_csv(csv, { header: 1 });
          return csv;
        } catch (e) {
          console.error(e);
          return "";
        }
      }
      return gk_fileData[filename] || "";
    }
  </script>

<script>
let knownBoxes = {};
let connectedBoxes = [];
let transferPending = {};
let transferCompleted = {};
let transferCancelled = false;
let transferStatusLines = [];
let transferring = false;
let statusArea;
let boxOrder = [];
let devicesPollInFlight = false;
let devicesPollPromise = null;

const devicesPollIntervalMs = 1000;
let localBrowserMode = false;
let localScanInFlight = false;
let localScanAbortController = null;
let localScanSubnet = "192.168.137";
let localAutoScanStarted = false;
let webspaceAuthenticated = false;
let localSubnetCandidates = [];
const localStorageKey = "riddlematrix.localBrowserConfig.v1";
const webspaceAuthStorageKey = "riddlematrix.webspaceAuth.v1";
const days = ["mo", "di", "mi", "do", "fr", "sa", "so"];
const dayNames = ["Mo", "Di", "Mi", "Do", "Fr", "Sa", "So"];
const firmwareDayIndexByDay = { so: 0, mo: 1, di: 2, mi: 3, do: 4, fr: 5, sa: 6 };
const triggersPerDay = 3;
const defaultColor = "#ffffff";
const defaultDelay = 0;
const defaultColorMode = "fixed";
const defaultColorPaletteMask = 0xFF;
const randomPalette = [
  { color: "#ff0000", label: "Rot" },
  { color: "#00ff00", label: "Gruen" },
  { color: "#0000ff", label: "Blau" },
  { color: "#ffff00", label: "Gelb" },

  { color: "#00ffff", label: "Cyan" },

];
const colorPattern = /^#[0-9A-Fa-f]{6}$/;
const letterLabels = {"": "Leer", "*": "Sun+Rad", "#": "Sun", "~": "WIFI", "&": "Rad", "?": "Riddler"};
const letterOptions = [""];
letterOptions.push(..."ABCDEFGHIJKLMNOPQRSTUVWXYZ*#~&?".split(""));
let currentWordTrigger = 0;
let separateWordTriggers = true;
let separateBoxTriggers = true;
function isHostedHttpsMode() {
  return location.protocol === "https:" && !["localhost", "127.0.0.1", "::1"].includes(location.hostname);
}

function updateRuntimeButtons() {
  const shutdownButton = document.getElementById("shutdown");
  const settingsButton = document.getElementById("settingsBtn");
  const shutdownAvailable = !!shutdownButton;
  const shouldShowShutdown = shutdownAvailable && !isHostedHttpsMode() && location.protocol !== "file:";
  if (shutdownButton && !shouldShowShutdown) {
    shutdownButton.style.display = "none";
  }
  if (settingsButton && (!shutdownButton || !shouldShowShutdown || isHostedHttpsMode() || location.protocol === "file:")) {
    settingsButton.style.display = "block";
  }
}

async function sha256Hex(value) {
  const bytes = new TextEncoder().encode(String(value || ""));
  const digest = await crypto.subtle.digest("SHA-256", bytes);
  return Array.from(new Uint8Array(digest))
    .map(byte => byte.toString(16).padStart(2, "0"))
    .join("");
}

async function ensureWebspaceAccess() {
  if (!isHostedHttpsMode()) {
    webspaceAuthenticated = true;
    return true;
  }
  const expectedHash = String(window.RIDDLEMATRIX_WEBSPACE_AUTH_SHA256 || "").trim().toLowerCase();
  if (!expectedHash) {
    webspaceAuthenticated = true;
    return true;
  }
  if (window.sessionStorage.getItem(webspaceAuthStorageKey) === expectedHash) {
    webspaceAuthenticated = true;
    return true;
  }

  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.className = "auth-overlay";
    overlay.innerHTML = `
      <div class="auth-card">
        <h2>Märchen Manager</h2>
        <p>Bitte Passwort eingeben.</p>
        <input id="webspacePasswordInput" type="password" autocomplete="current-password" autofocus>
        <button id="webspacePasswordButton" type="button">Öffnen</button>
        <p id="webspacePasswordStatus" class="status"></p>
      </div>`;
    document.body.appendChild(overlay);
    const input = document.getElementById("webspacePasswordInput");
    const button = document.getElementById("webspacePasswordButton");
    const status = document.getElementById("webspacePasswordStatus");
    const submit = async () => {
      const hash = await sha256Hex(input.value);
      if (hash === expectedHash) {
        window.sessionStorage.setItem(webspaceAuthStorageKey, expectedHash);
        webspaceAuthenticated = true;
        overlay.remove();
        resolve(true);
      } else {
        status.textContent = "Passwort falsch.";
        input.value = "";
        input.focus();
      }
    };
    button.addEventListener("click", submit);
    input.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        submit();
      }
    });
    input.focus();
  });
}

function loadLocalBrowserConfig() {
  try {
    const raw = window.localStorage.getItem(localStorageKey);
    if (!raw) {
      return { boxen: {}, boxOrder: [] };
    }
    const parsed = JSON.parse(raw);
    if (!parsed || typeof parsed !== "object") {
      return { boxen: {}, boxOrder: [] };
    }
    return {
      boxen: parsed.boxen && typeof parsed.boxen === "object" ? parsed.boxen : {},
      boxOrder: Array.isArray(parsed.boxOrder) ? parsed.boxOrder : Object.keys(parsed.boxen || {}),
      localScanSubnet: typeof parsed.localScanSubnet === "string" ? parsed.localScanSubnet : "192.168.137"
    };
  } catch (error) {
    console.warn("Lokale Browser-Konfiguration konnte nicht gelesen werden:", error);
    return { boxen: {}, boxOrder: [] };
  }
}

function saveLocalBrowserConfig() {
  if (!localBrowserMode) {
    return;
  }
  window.localStorage.setItem(localStorageKey, JSON.stringify({ boxen: knownBoxes, boxOrder, localScanSubnet }));
}

function enterLocalBrowserMode(reason) {
  if (!localBrowserMode) {
    localBrowserMode = true;
    const localConfig = loadLocalBrowserConfig();
    localScanSubnet = validateSubnetPrefix(localConfig.localScanSubnet) || localScanSubnet;
    knownBoxes = {};
    Object.entries(localConfig.boxen).forEach(([hostname, box]) => {
      knownBoxes[hostname] = normalizeBox(JSON.parse(JSON.stringify(box)));
    });
    boxOrder = localConfig.boxOrder.filter(hostname => knownBoxes[hostname]);
    Object.keys(knownBoxes).forEach(hostname => {
      if (!boxOrder.includes(hostname)) {
        boxOrder.push(hostname);
      }
    });
  }
  connectedBoxes = boxOrder
    .map(hostname => ({ hostname, ip: knownBoxes[hostname]?.ip }))
    .filter(box => box.ip && box.ip !== "0.0.0.0");
  renderDeviceList();
  if (statusArea) {
    const message = reason || "Webspace-Modus aktiv: Boxen werden direkt aus diesem Browser im lokalen WLAN verwaltet.";
    statusArea.innerHTML = `<div class="statusEntry status">${escapeHtml(message)}</div>`;
  }
  if (isHostedHttpsMode() && !localAutoScanStarted) {
    localAutoScanStarted = true;
    window.setTimeout(() => scanLocalSubnet({ automatic: true, detectSubnet: true }), 250);
  }
}

function validateIpAddress(ip) {
  const value = String(ip || "").trim();
  const parts = value.split(".");
  if (parts.length !== 4) {
    return "";
  }
  for (const part of parts) {
    if (!/^\d{1,3}$/.test(part)) {
      return "";
    }
    const number = Number(part);
    if (!Number.isInteger(number) || number < 0 || number > 255) {
      return "";
    }
  }
  return value;
}

function validateSubnetPrefix(subnet) {
  const value = String(subnet || "").trim();
  const parts = value.split(".");
  if (parts.length !== 3) {
    return "";
  }
  for (const part of parts) {
    if (!/^\d{1,3}$/.test(part)) {
      return "";
    }
    const number = Number(part);
    if (!Number.isInteger(number) || number < 0 || number > 255) {
      return "";
    }
  }
  return parts.map(part => String(Number(part))).join(".");
}

function subnetPrefixFromIp(ip) {
  const value = validateIpAddress(ip);
  if (!value) {
    return "";
  }
  const parts = value.split(".");
  if (parts[0] === "127" || parts[0] === "0" || parts[0] === "169") {
    return "";
  }
  return parts.slice(0, 3).join(".");
}

function addSubnetCandidate(candidate, candidates = localSubnetCandidates) {
  const subnet = validateSubnetPrefix(candidate);
  if (subnet && !candidates.includes(subnet)) {
    candidates.push(subnet);
  }
  return candidates;
}

function collectKnownSubnetCandidates(candidates = []) {
  Object.values(knownBoxes || {}).forEach(box => {
    addSubnetCandidate(subnetPrefixFromIp(box?.ip), candidates);
  });
  addSubnetCandidate(subnetPrefixFromIp(location.hostname), candidates);
  return candidates;
}

function updateSubnetCandidateUi() {
  const dataList = document.getElementById("localSubnetCandidateList");
  if (dataList) {
    dataList.innerHTML = localSubnetCandidates
      .map(subnet => `<option value="${escapeHtml(subnet)}">`)
      .join("");
  }
}

async function detectServerSubnetCandidates(candidates) {
  if (isHostedHttpsMode() || location.protocol === "file:") {
    return candidates;
  }
  try {
    const response = await fetchWithTimeout("/local_networks", { cache: "no-store" }, 1200);
    if (!response.ok) {
      return candidates;
    }
    const data = await response.json();
    if (Array.isArray(data.subnets)) {
      data.subnets.forEach(subnet => addSubnetCandidate(subnet, candidates));
    }
    addSubnetCandidate(data.defaultSubnet, candidates);
  } catch (error) {
    console.warn("Lokale Netzbereiche konnten nicht vom Manager gelesen werden:", error);
  }
  return candidates;
}

async function detectWebRtcSubnetCandidates(candidates) {
  const PeerConnection = window.RTCPeerConnection || window.webkitRTCPeerConnection;
  if (!PeerConnection) {
    return candidates;
  }

  let peer = null;
  try {
    peer = new PeerConnection({ iceServers: [] });
    peer.createDataChannel("riddlematrix");
    const seen = new Set();
    const parseCandidate = candidate => {
      const matches = String(candidate || "").match(/\b(?:\d{1,3}\.){3}\d{1,3}\b/g) || [];
      matches.forEach(ip => {
        if (!seen.has(ip)) {
          seen.add(ip);
          addSubnetCandidate(subnetPrefixFromIp(ip), candidates);
        }
      });
    };
    peer.onicecandidate = event => {
      if (event.candidate) {
        parseCandidate(event.candidate.candidate);
      }
    };
    const offer = await peer.createOffer();
    await peer.setLocalDescription(offer);
    parseCandidate(offer.sdp);
    await new Promise(resolve => window.setTimeout(resolve, 900));
    parseCandidate(peer.localDescription?.sdp);
  } catch (error) {
    console.warn("Browser-IP-Erkennung per WebRTC nicht verfuegbar:", error);
  } finally {
    if (peer) {
      peer.close();
    }
  }
  return candidates;
}

async function detectLocalSubnetCandidates({ apply = true, silent = false } = {}) {
  const candidates = [];
  collectKnownSubnetCandidates(candidates);
  await detectServerSubnetCandidates(candidates);
  await detectWebRtcSubnetCandidates(candidates);
  addSubnetCandidate(localScanSubnet, candidates);
  addSubnetCandidate("192.168.137", candidates);
  addSubnetCandidate("192.168.178", candidates);
  addSubnetCandidate("192.168.1", candidates);
  addSubnetCandidate("192.168.0", candidates);

  localSubnetCandidates = candidates;
  if (apply && candidates.length > 0) {
    localScanSubnet = candidates[0];
    const input = document.getElementById("localSubnetPrefix");
    if (input) {
      input.value = localScanSubnet;
    }
    saveLocalBrowserConfig();
  }
  updateSubnetCandidateUi();
  if (!silent) {
    updateLocalScanStatus(
      candidates.length > 0
        ? `IP-Bereich erkannt: ${candidates[0]}.0/24`
        : "IP-Bereich konnte nicht automatisch erkannt werden. Bitte manuell eintragen."
    );
  }
  return candidates;
}

function fetchWithTimeout(url, options = {}, timeoutMs = 900) {
  const controller = new AbortController();
  const parentSignal = options.signal;
  const timeoutId = window.setTimeout(() => controller.abort(), timeoutMs);
  if (parentSignal) {
    if (parentSignal.aborted) {
      controller.abort();
    } else {
      parentSignal.addEventListener("abort", () => controller.abort(), { once: true });
    }
  }
  return fetch(url, { ...options, signal: controller.signal })
    .finally(() => window.clearTimeout(timeoutId));
}

function makeDefaultBox(ip) {
  const box = normalizeBox({ ip, letters: {}, colors: {}, delays: {}, colorModes: {}, colorPaletteMasks: {} });
  return box;
}

function selectedValueFromSelect(doc, names, fallback = "") {
  for (const name of names) {
    const select = doc.querySelector(`select[name="${name}"], select#${name}`);
    if (!select) {
      continue;
    }
    const selected = select.querySelector("option:checked");
    if (selected) {
      return selected.value ?? fallback;
    }
    if (select.value != null) {
      return select.value;
    }
  }
  return fallback;
}

function inputValueFromNames(doc, names, fallback = "") {
  for (const name of names) {
    const input = doc.querySelector(`input[name="${name}"], input#${name}`);
    if (input) {
      return input.value ?? fallback;
    }
  }
  return fallback;
}

function checkboxCheckedByName(doc, name) {
  const input = doc.querySelector(`input[name="${name}"]`);
  return !!(input && input.checked);
}

function extractLocalBoxStateFromHtml(html, ip) {
  const doc = new DOMParser().parseFromString(String(html || ""), "text/html");
  const box = makeDefaultBox(ip);
  days.forEach((day, dayIndex) => {
    const firmwareDayIndex = firmwareDayIndexByDay[day] ?? dayIndex;
    for (let trigger = 0; trigger < triggersPerDay; trigger += 1) {
      const letterNames = [
        `letter_${trigger}_${firmwareDayIndex}`,
        `letter_${trigger}_${dayIndex}`,
        trigger === 0 ? `letter${firmwareDayIndex}` : "",
        trigger === 0 ? `letter${dayIndex}` : "",
        `letter_${firmwareDayIndex}_${trigger}`,
        `letter_${dayIndex}_${trigger}`,
        `letter${firmwareDayIndex}_${trigger}`,
        `letter${dayIndex}_${trigger}`
      ].filter(Boolean);
      box.letters[day][trigger] = selectedValueFromSelect(doc, letterNames, box.letters[day][trigger] || "");

      const colorNames = [
        `color_${trigger}_${firmwareDayIndex}`,
        `color_${trigger}_${dayIndex}`,
        trigger === 0 ? `color${firmwareDayIndex}` : "",
        trigger === 0 ? `color${dayIndex}` : "",
        `color_${firmwareDayIndex}_${trigger}`,
        `color_${dayIndex}_${trigger}`,
        `color${firmwareDayIndex}_${trigger}`,
        `color${dayIndex}_${trigger}`
      ].filter(Boolean);
      box.colors[day][trigger] = sanitizeColor(inputValueFromNames(doc, colorNames, box.colors[day][trigger]));

      const modeNames = [
        `color_mode_${trigger}_${firmwareDayIndex}`,
        `color_mode_${trigger}_${dayIndex}`
      ];
      const mode = selectedValueFromSelect(doc, modeNames, defaultColorMode).trim().toLowerCase();
      box.colorModes[day][trigger] = ["fixed", "random_selected", "random_all"].includes(mode) ? mode : defaultColorMode;

      let mask = 0;
      for (let paletteIndex = 0; paletteIndex < randomPalette.length; paletteIndex += 1) {
        if (
          checkboxCheckedByName(doc, `palette_${trigger}_${firmwareDayIndex}_${paletteIndex}`) ||
          checkboxCheckedByName(doc, `palette_${trigger}_${dayIndex}_${paletteIndex}`)
        ) {
          mask |= 1 << paletteIndex;
        }
      }
      box.colorPaletteMasks[day][trigger] = mask || defaultColorPaletteMask;

      const delayNames = [
        `delay_${trigger}_${firmwareDayIndex}`,
        `delay_${trigger}_${dayIndex}`,
        `delay_${firmwareDayIndex}_${trigger}`,
        `delay_${dayIndex}_${trigger}`
      ];
      const parsedDelay = parseFloat(String(inputValueFromNames(doc, delayNames, box.delays[day][trigger])).replace(",", "."));
      box.delays[day][trigger] = Number.isFinite(parsedDelay) && parsedDelay >= 0
        ? Math.min(999, Math.round(parsedDelay))
        : defaultDelay;
    }
  });
  return normalizeBox(box);
}

async function fetchLocalTriggerDelays(ip, box, signal = null) {
  try {
    const response = await fetchWithTimeout(
      `http://${ip}/api/trigger-delays`,
      { method: "GET", mode: "cors", cache: "no-store", signal },
      900
    );
    if (!response.ok) {
      return box;
    }
    const data = await response.json();
    if (!data || typeof data.delays !== "object") {
      return box;
    }
    days.forEach(day => {
      const values = data.delays[day];
      if (!Array.isArray(values)) {
        return;
      }
      for (let trigger = 0; trigger < triggersPerDay; trigger += 1) {
        const parsed = parseFloat(String(values[trigger]).replace(",", "."));
        box.delays[day][trigger] = Number.isFinite(parsed) && parsed >= 0
          ? Math.min(999, Math.round(parsed))
          : defaultDelay;
      }
    });
  } catch (error) {
    console.warn("Trigger-Delays konnten lokal nicht gelesen werden:", error);
  }
  return normalizeBox(box);
}

function hostnameFromBoxHtml(html, fallbackIp) {
  const titleMatch = String(html || "").match(/<title[^>]*>(.*?)<\/title>/i);
  if (titleMatch && titleMatch[1]) {
    const title = titleMatch[1].replace(/<[^>]+>/g, "").trim();
    if (title && title.length <= 64) {
      return title.replace(/[^A-Za-z0-9._-]+/g, "-").replace(/^-+|-+$/g, "") || `Box-${fallbackIp.replace(/\./g, "-")}`;
    }
  }
  return `Box-${fallbackIp.replace(/\./g, "-")}`;
}

function looksLikeRiddleMatrixBox(html) {
  const text = String(html || "");
  return text.includes("RiddleMatrix") ||
    text.includes("/updateAllLetters") ||
    text.includes("triggerLetter") ||
    text.includes("letter_0_");
}

async function learnLocalBoxByIp(ip, { signal = null, silent = false } = {}) {
  ip = validateIpAddress(ip);
  if (!ip) {
    if (!silent) {
      alert("Bitte eine gueltige lokale IPv4-Adresse eintragen.");
    }
    return null;
  }
  let hostname = `Box-${ip.replace(/\./g, "-")}`;
  let learnedBox = makeDefaultBox(ip);
  try {
    const response = await fetchWithTimeout(
      `http://${ip}/`,
      { method: "GET", mode: "cors", cache: "no-store", signal },
      900
    );
    if (response.ok) {
      const html = await response.text();
      if (silent && !looksLikeRiddleMatrixBox(html)) {
        return null;
      }
      hostname = hostnameFromBoxHtml(html, ip);
      learnedBox = extractLocalBoxStateFromHtml(html, ip);
      learnedBox = await fetchLocalTriggerDelays(ip, learnedBox, signal);
    } else if (silent) {
      return null;
    }
  } catch (error) {
    if (silent) {
      return null;
    }
    console.warn("Box konnte nicht abgefragt werden, sie wird trotzdem lokal angelegt:", error);
  }
  let candidate = hostname;
  let suffix = 2;
  while (knownBoxes[candidate] && knownBoxes[candidate].ip !== ip) {
    candidate = `${hostname}-${suffix++}`;
  }
  knownBoxes[candidate] = learnedBox;
  knownBoxes[candidate].ip = ip;
  if (!boxOrder.includes(candidate)) {
    boxOrder.push(candidate);
  }
  saveLocalBrowserConfig();
  if (!silent) {
    enterLocalBrowserMode(`Lokale Box gespeichert: ${candidate} (${ip})`);
    showSetup();
  }
  return { hostname: candidate, ip };
}

async function learnLocalBoxFromIp() {

}

async function scanLocalSubnet(options = {}) {
  const automatic = !!options.automatic;
  const detectSubnet = !!options.detectSubnet;
  if (localScanInFlight) {
    if (!automatic) {
      stopLocalScan();
    }
    return;
  }

  if (detectSubnet) {
    await detectLocalSubnetCandidates({ apply: true, silent: true });
  }

  const subnetInput = document.getElementById("localSubnetPrefix");
  const subnet = validateSubnetPrefix(subnetInput ? subnetInput.value : localScanSubnet);
  if (!subnet) {
    if (!automatic) {
      alert("Bitte ein gueltiges Subnetz eintragen, z.B. 192.168.137");
    }
    return;
  }

  localScanSubnet = subnet;
  saveLocalBrowserConfig();
  localScanInFlight = true;
  localScanAbortController = new AbortController();
  const scanButton = document.getElementById("localScanBtn");
  if (scanButton) {
    scanButton.textContent = "Scan abbrechen";
  }

  let checked = 0;
  let found = 0;
  const ips = [];
  for (let host = 2; host <= 254; host += 1) {
    ips.push(`${subnet}.${host}`);
  }
  const concurrency = 18;
  let cursor = 0;

  updateLocalScanStatus(`Suche Märchen im lokalen Netz ${subnet}.0/24...`);

  async function worker() {
    while (cursor < ips.length && !localScanAbortController.signal.aborted) {
      const ip = ips[cursor++];
      const result = await learnLocalBoxByIp(ip, {
        signal: localScanAbortController.signal,
        silent: true
      });
      checked += 1;
      if (result) {
        found += 1;
        renderDeviceList();
        saveLocalBrowserConfig();
      }
      if (checked % 10 === 0 || result) {
        updateLocalScanStatus(`Suche Märchen: ${checked}/${ips.length} geprüft, ${found} gefunden.`);
      }
    }
  }

  try {
    await Promise.all(Array.from({ length: concurrency }, () => worker()));
  } finally {
    const aborted = localScanAbortController.signal.aborted;
    localScanInFlight = false;
    localScanAbortController = null;
    if (scanButton) {
      scanButton.textContent = "Subnetz scannen";
    }
    connectedBoxes = boxOrder
      .map(hostname => ({ hostname, ip: knownBoxes[hostname]?.ip }))
      .filter(box => box.ip && box.ip !== "0.0.0.0");
    saveLocalBrowserConfig();
    renderDeviceList();
    showSetup();
    updateLocalScanStatus(
      aborted
        ? `Suche abgebrochen. ${found} Märchen gefunden.`
        : `Suche abgeschlossen. ${found} Märchen gefunden.`
    );
  }
}
function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;")
    .replace(/`/g, "&#96;");
}

function sanitizeColor(color) {
  const value = typeof color === "string" ? color.trim() : "";
  if (colorPattern.test(value)) {
    return value.toLowerCase();
  }
  return defaultColor;
}

function escapeColor(color) {
  return escapeHtml(sanitizeColor(color));
}

function escapeJsString(value) {
  return escapeHtml(JSON.stringify(value ?? ""));
}

function scheduleNextDevicesPoll(delay = devicesPollIntervalMs) {
  const normalizedDelay = Number.isFinite(delay) && delay >= 0 ? delay : devicesPollIntervalMs;
  if (devicesPollTimeoutId) {
    clearTimeout(devicesPollTimeoutId);
  }
  devicesPollTimeoutId = window.setTimeout(() => {
    devicesPollTimeoutId = null;
    fetchDevices();
  }, normalizedDelay);
}

function normalizeBox(box) {
  box = box || {};
  box.letters = box.letters || {};
  box.colors = box.colors || {};
  box.delays = box.delays || {};
  box.colorModes = box.colorModes || {};
  box.colorPaletteMasks = box.colorPaletteMasks || {};
  days.forEach(day => {
    const letters = Array.isArray(box.letters[day]) ? box.letters[day].slice(0, triggersPerDay) : [];
    while (letters.length < triggersPerDay) letters.push("");
    box.letters[day] = letters;

    const colors = Array.isArray(box.colors[day]) ? box.colors[day].slice(0, triggersPerDay) : [];
    const sanitizedColors = colors.map(sanitizeColor);
    while (sanitizedColors.length < triggersPerDay) sanitizedColors.push(defaultColor);
    box.colors[day] = sanitizedColors;

    const delays = Array.isArray(box.delays[day]) ? box.delays[day].slice(0, triggersPerDay) : [];
    while (delays.length < triggersPerDay) delays.push(defaultDelay);
    box.delays[day] = delays.map(value => {
      const numeric = typeof value === "number" ? value : parseFloat(String(value).replace(",", "."));
      if (!Number.isFinite(numeric) || numeric < 0) {
        return defaultDelay;
      }
      return Math.min(999, Math.round(numeric));
    });

    const colorModes = Array.isArray(box.colorModes[day]) ? box.colorModes[day].slice(0, triggersPerDay) : [];
    while (colorModes.length < triggersPerDay) colorModes.push(defaultColorMode);
    box.colorModes[day] = colorModes.map(value => {
      const normalized = typeof value === "string" ? value.trim().toLowerCase() : defaultColorMode;
      return ["fixed", "random_selected", "random_all"].includes(normalized) ? normalized : defaultColorMode;
    });

    const colorPaletteMasks = Array.isArray(box.colorPaletteMasks[day]) ? box.colorPaletteMasks[day].slice(0, triggersPerDay) : [];
    while (colorPaletteMasks.length < triggersPerDay) colorPaletteMasks.push(defaultColorPaletteMask);
    box.colorPaletteMasks[day] = colorPaletteMasks.map(value => {
      const numeric = typeof value === "number" ? value : parseInt(String(value), 10);
      if (!Number.isFinite(numeric) || numeric < 0) {
        return defaultColorPaletteMask;
      }
      return numeric & defaultColorPaletteMask;
    });
  });
  return box;
}

async function fetchDevices() {
  if (localBrowserMode) {
    enterLocalBrowserMode();
    return Promise.resolve();
  }
  if (devicesPollInFlight) {
    return devicesPollPromise;
  }

  devicesPollInFlight = true;
  const pollPromise = (async () => {
    try {
      const res = await fetch("/devices");
      if (!res.ok) {
        if (isHostedHttpsMode()) {
          enterLocalBrowserMode("Webspace-Modus aktiv: /devices ist auf dem Server nicht verfuegbar, lokale Boxen werden im Browser gespeichert.");
          return;
        }
        let errorMessage = `❌ Fehler beim Laden der Boxen (${res.status} ${res.statusText || ""})`;
        try {
          const errorData = await res.json();
          if (errorData && typeof errorData === "object") {
            const details = [errorData.message, errorData.error, errorData.detail]
              .filter(part => typeof part === "string" && part.trim().length > 0)
              .join(" – ");
            if (details) {
              errorMessage += `: ${details}`;
            }
          }
        } catch (jsonError) {
          try {
            const text = await res.text();
            if (text) {
              errorMessage += `: ${text.trim()}`;
            }
          } catch (textError) {
            console.warn("Fehlerdetails konnten nicht gelesen werden:", textError);
          }
        }
        console.error("Fehlerhafte Antwort von /devices:", res.status, res.statusText);
        if (statusArea) {
          statusArea.innerHTML = `<div class="statusEntry status">${escapeHtml(errorMessage)}</div>`;
          statusArea.dataset.fetchError = "true";
        }
        return;
      }

      const data = await res.json();
      const newKnownBoxes = data.boxen || {};
      const newConnectedBoxes = data.connected || [];
      const newBoxOrder = data.boxOrder || Object.keys(newKnownBoxes);

      const normalizedIncoming = {};
      Object.entries(newKnownBoxes).forEach(([hostname, box]) => {
        normalizedIncoming[hostname] = normalizeBox(JSON.parse(JSON.stringify(box)));
      });

      // Prüfe auf Änderungen
      const hasChanges =
        JSON.stringify(knownBoxes) !== JSON.stringify(normalizedIncoming) ||
        JSON.stringify(connectedBoxes) !== JSON.stringify(newConnectedBoxes) ||
        JSON.stringify(boxOrder) !== JSON.stringify(newBoxOrder);

      knownBoxes = normalizedIncoming;
      connectedBoxes = newConnectedBoxes;
      boxOrder = newBoxOrder;

      if (statusArea && statusArea.dataset.fetchError === "true") {
        statusArea.innerHTML = "";
        delete statusArea.dataset.fetchError;
      }

      renderDeviceList();
      const activeElement = document.activeElement;
      const isLiveEditElement = !!(activeElement && (
        (typeof activeElement.matches === "function" && activeElement.matches('[data-live-edit]')) ||
        (activeElement.classList && (activeElement.classList.contains("word-input") || activeElement.classList.contains("delay-input"))) ||
        activeElement.tagName === "SELECT"
      ));
      // Nur showSetup() aufrufen, wenn kein relevantes Eingabefeld fokussiert ist
      if (hasChanges && statusArea && !transferring && !isLiveEditElement) {
        showSetup();
      }
    } catch (e) {
      if (isHostedHttpsMode()) {
        enterLocalBrowserMode("Webspace-Modus aktiv: Der Server kann dein lokales WLAN nicht sehen, der Browser verwaltet die Boxen direkt.");
        return;
      }
      console.error("Fehler beim Abrufen der Geräte:", e);
      if (statusArea) {
        const message = `❌ Fehler beim Laden der Boxen: ${e && e.message ? e.message : "Unbekannter Fehler"}`;
        statusArea.innerHTML = `<div class="statusEntry status">${escapeHtml(message)}</div>`;
        statusArea.dataset.fetchError = "true";
      }
    } finally {
      devicesPollInFlight = false;
      devicesPollPromise = null;
      scheduleNextDevicesPoll(devicesPollIntervalMs);
    }
  })();

  devicesPollPromise = pollPromise;
  return pollPromise;
}

function renderDeviceList() {
  const list = document.getElementById("deviceList");
  const visibleBoxes = localBrowserMode
    ? boxOrder.map(hostname => ({ hostname, ip: knownBoxes[hostname]?.ip })).filter(box => box.ip)
    : connectedBoxes;
  list.innerHTML = visibleBoxes.length ? "" : "Keine verbundenen Boxen";
  visibleBoxes.forEach(({ hostname, ip }) => {
    const div = document.createElement("div");
    div.className = "device";
    div.innerText = `${hostname} (${ip})`;
    div.onclick = () => openBox(ip);
    list.appendChild(div);
  });
}

function openBox(ip) {
  const container = document.getElementById("content");
  while (container.firstChild) {
    container.removeChild(container.firstChild);
  }
  if (isHostedHttpsMode()) {
    const url = `http://${ip}`;
    const wrapper = document.createElement("div");
    wrapper.className = "box-card";
    wrapper.innerHTML = `<h2>Box-Webinterface</h2><p>Aus einer HTTPS-Webspace-Seite darf ein lokales HTTP-Webinterface nicht eingebettet werden. Oeffne die Box in einem eigenen Tab:</p><p><a href="${escapeHtml(url)}" target="_blank" rel="noopener">${escapeHtml(url)}</a></p>`;
    container.appendChild(wrapper);
    return;
  }
  const iframe = document.createElement("iframe");
  iframe.src = `http://${ip}`;
  container.appendChild(iframe);
}

async function shutdown() {
  if (!window.confirm("Soll das System wirklich heruntergefahren werden?")) {
    return;
  }

  const shutdownButton = document.getElementById("shutdown");
  if (!shutdownButton) {
    return;
  }
  const originalLabel = shutdownButton.textContent;
  shutdownButton.disabled = true;
  shutdownButton.textContent = "Wird heruntergefahren...";

  try {
    const response = await fetch("/shutdown", { method: "POST" });
    if (!response.ok) {
      alert("Fehler beim Abschalten: " + response.statusText);
      return;
    }
    let message = "Shutdown ausgelöst.";
    try {
      const data = await response.json();
      if (data && data.status) {
        message = "Shutdown ausgelöst (" + data.status + ").";
      }
    } catch (e) {
      // JSON optional
    }
    alert(message + " Das Gerät kann einige Minuten zum Herunterfahren benötigen.");
  } catch (error) {
    console.error(error);
    alert("Netzwerkfehler beim Abschalten. Bitte erneut versuchen.");
  } finally {
    shutdownButton.disabled = false;
    shutdownButton.textContent = originalLabel;
  }
}

function handleKeydown(event, day, word, maxLength, inputElement, triggerIndex = 0, applyAllTriggers = false) {
  if (event.key === "Enter") {
    updateWord(day, word, maxLength, inputElement, triggerIndex, applyAllTriggers);
  }
}

function updateWord(day, word, maxLength, inputElement, triggerIndex = 0, applyAllTriggers = false) {
  if (inputElement) {
    inputElement.classList.add("pending");
  }
  const sanitizedWord = (word || "").toUpperCase().replace(/[^A-Z*#~&?]/g, '').slice(0, maxLength);
  word = sanitizedWord;
  if (inputElement) {
    inputElement.value = sanitizedWord;
  }
  for (let i = 0; i < boxOrder.length; i++) {
    const letter = i < word.length ? word[i] : "";
    knownBoxes[boxOrder[i]] = knownBoxes[boxOrder[i]] || {};
    saveField(boxOrder[i], day, triggerIndex, letter, 'letter', false, inputElement, applyAllTriggers);
  }
  showSetup();
}

function saveField(hostname, day, triggerIndex, value, fieldType = 'letter', updateUI = true, inputElement = null, applyAllTriggers = false) {
  if (inputElement) {
    inputElement.classList.add('pending');
  }

  knownBoxes[hostname] = normalizeBox(knownBoxes[hostname] || {});
  const slotIndex = Number(triggerIndex);
  const targetIndices = applyAllTriggers ? [...Array(triggersPerDay).keys()] : [slotIndex];
  if (fieldType === 'letter') {
    const normalizedLetter = value == null ? "" : String(value);
    targetIndices.forEach(index => {
      knownBoxes[hostname].letters[day][index] = normalizedLetter;
    });
    value = normalizedLetter;
  } else if (fieldType === 'color') {
    const colorValue = sanitizeColor(value);
    targetIndices.forEach(index => {
      knownBoxes[hostname].colors[day][index] = colorValue;
    });
    value = colorValue;
  } else if (fieldType === 'delay') {
    let numericValue = typeof value === 'number' ? value : parseFloat(String(value).replace(",", "."));
    if (!Number.isFinite(numericValue) || numericValue < 0) {
      numericValue = defaultDelay;
    }
    numericValue = Math.min(999, Math.max(0, Math.round(numericValue)));
    targetIndices.forEach(index => {
      knownBoxes[hostname].delays[day][index] = numericValue;
    });
    value = numericValue;
    if (inputElement) {
      inputElement.value = numericValue.toString();
    }
  } else if (fieldType === 'colorMode') {
    const normalizedMode = typeof value === "string" ? value.trim().toLowerCase() : defaultColorMode;
    targetIndices.forEach(index => {
      knownBoxes[hostname].colorModes[day][index] =
        ["fixed", "random_selected", "random_all"].includes(normalizedMode) ? normalizedMode : defaultColorMode;
    });
    value = normalizedMode;
  }

  if (localBrowserMode) {
    saveLocalBrowserConfig();
    if (inputElement) {
      inputElement.classList.remove("pending");
      inputElement.classList.add("saved");
      setTimeout(() => inputElement.classList.remove("saved"), 1000);
    }
    if (statusArea) {
      statusArea.innerHTML = '<div class="statusEntry status">Aenderung lokal gespeichert.</div>';
    }
    if (updateUI) showSetup();
    return;
  }

  const payload = { hostname, day, triggerIndex: slotIndex, applyAllTriggers };
  if (fieldType === 'letter') {
    payload.letter = value;
  } else if (fieldType === 'color') {
    payload.color = sanitizeColor(value);
  } else if (fieldType === 'delay') {
    payload.delay = value;
  } else if (fieldType === 'colorMode') {
    payload.colorMode = value;
  }

  const requestHeaders = { "Content-Type": "application/json" };

  fetch("/update_box", {
    method: "POST",
    headers: requestHeaders,
    body: JSON.stringify(payload)
  }).then(response => {
    if (!response.ok) {
      statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Speichen.</div>';
      if (inputElement) inputElement.classList.remove("pending");
    } else {
      if (inputElement) {
        inputElement.classList.remove("pending");
        inputElement.classList.add("saved");
        setTimeout(() => inputElement.classList.remove("saved"), 1000);
        statusArea.innerHTML = '<div class="statusEntry status">✅ Änderung gespeichert.</div>';
      }
    if (updateUI) showSetup();
    }
  }).catch(e => {
    console.error("Fehler beim Speichern:", e);
    statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Speichern.</div>';
    if (inputElement) inputElement.classList.remove("pending");
  });
}

function savePalette(hostname, day, triggerIndex, applyAllTriggers = false) {
  const selector = `input[data-palette-hostname="${hostname}"][data-palette-day="${day}"][data-palette-trigger="${triggerIndex}"]`;
  const inputs = Array.from(document.querySelectorAll(selector));
  let mask = 0;
  inputs.forEach(input => {
    if (input.checked) {
      const paletteIndex = parseInt(input.getAttribute("data-palette-index"), 10);
      if (Number.isInteger(paletteIndex) && paletteIndex >= 0) {
        mask |= 1 << paletteIndex;
      }
    }
  });
  if (mask === 0) {
    mask = defaultColorPaletteMask;
  }

  knownBoxes[hostname] = normalizeBox(knownBoxes[hostname] || {});
  const targetIndices = applyAllTriggers ? [...Array(triggersPerDay).keys()] : [Number(triggerIndex)];
  targetIndices.forEach(index => {
    knownBoxes[hostname].colorPaletteMasks[day][index] = mask;
  });

  if (localBrowserMode) {
    saveLocalBrowserConfig();
    statusArea.innerHTML = '<div class="statusEntry status">Zufallspalette lokal gespeichert.</div>';
    showSetup();
    return;
  }

  fetch("/update_box", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ hostname, day, triggerIndex: Number(triggerIndex), colorPaletteMask: mask, applyAllTriggers })
  }).then(response => {
    if (!response.ok) {
      statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Speichern der Zufallspalette.</div>';
    } else {
      statusArea.innerHTML = '<div class="statusEntry status">✅ Zufallspalette gespeichert.</div>';
      showSetup();
    }
  }).catch(error => {
    console.error("Fehler beim Speichern der Zufallspalette:", error);
    statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Speichern der Zufallspalette.</div>';
  });
}

function setSeparateWordTriggers(enabled) {
  separateWordTriggers = !!enabled;
  showSetup();
}

function setSeparateBoxTriggers(enabled) {
  separateBoxTriggers = !!enabled;
  showSetup();
}

function changeWordTrigger(newTrigger) {
  if (!Number.isInteger(newTrigger)) {
    newTrigger = parseInt(newTrigger, 10);
  }
  if (Number.isNaN(newTrigger) || newTrigger < 0 || newTrigger >= triggersPerDay) {
    return;
  }
  currentWordTrigger = newTrigger;
  showSetup();
}

function moveBoxUp(hostname) {
  const index = boxOrder.indexOf(hostname);
  if (index > 0) {
    [boxOrder[index - 1], boxOrder[index]] = [boxOrder[index], boxOrder[index - 1]];
    saveBoxOrder();
  }
}

function moveBoxDown(hostname) {
  const index = boxOrder.indexOf(hostname);
  if (index < boxOrder.length - 1) {
    [boxOrder[index], boxOrder[index + 1]] = [boxOrder[index + 1], boxOrder[index]];
    saveBoxOrder();
  }
}

function saveBoxOrder() {
  if (localBrowserMode) {
    saveLocalBrowserConfig();
    showSetup();
    return;
  }
  const requestHeaders = { "Content-Type": "application/json" };

  fetch("/update_box_order", {
    method: "POST",
    headers: requestHeaders,
    body: JSON.stringify({ boxOrder })
  }).then(response => {
    if (!response.ok) {
      statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Speichern der Reihenfolge.</div>';
    } else {
      showSetup();
    }
  }).catch(e => {
    console.error("Fehler beim Speichern der Reihenfolge:", e);
    statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Speichern der Reihenfolge.</div>';
  });
}

function removeBox(hostname) {
  if (localBrowserMode) {
    delete knownBoxes[hostname];
    boxOrder = boxOrder.filter(entry => entry !== hostname);
    saveLocalBrowserConfig();
    enterLocalBrowserMode(`Box entfernt: ${hostname}`);
    showSetup();
    return;
  }
  const headers = { "Content-Type": "application/json" };

  fetch("/remove_box", {
    method: "POST",
    headers,
    body: JSON.stringify({ hostname })
  }).then(response => {
    if (!response.ok) {
      statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Entfernen.</div>';
    } else {
      showSetup();
    }
  }).catch(e => {
    console.error("Fehler beim Entfernen:", e);
    statusArea.innerHTML = '<div class="statusEntry status">❌ Fehler beim Entfernen.</div>';
  });
}

function updateTransferButton() {
  const transferBtn = document.getElementById("transferBtn");
  if (!transferBtn) {
    return;
  }
  if (transferring) {
    const remaining = Object.keys(transferPending).length;
    transferBtn.innerText = `Abbrechen (${remaining} offen)`;
  } else {
    transferBtn.innerText = "✓ Übertragen";
  }
}

function appendTransferStatus(message) {
  transferStatusLines.push(message);
  if (transferStatusLines.length > 20) {
    transferStatusLines.shift();
  }
  renderTransferStatus();
}

function renderTransferStatus() {
  if (!statusArea || transferStatusLines.length === 0) {
    return;
  }
  statusArea.innerHTML = transferStatusLines
    .map(message => `<div class="statusEntry">${escapeHtml(message)}</div>`)
    .join("");
}

function isTransferSuccess(statusText) {
  return typeof statusText === "string" && (
    statusText.includes("Übertragen") ||
    statusText.includes("Uebertragen") ||
    statusText.includes("Bereits aktuell")
  );
}

async function transferBox(hostname) {
  const headers = { "Content-Type": "application/json" };

  let statusText = "❌ Unbekannter Fehler";

  if (localBrowserMode) {
    statusText = "Unbekannter Fehler";
    const box = knownBoxes[hostname];
    const ip = validateIpAddress(box?.ip);
    if (!box || !ip) {
      statusText = "Keine gueltige lokale IP hinterlegt";
      appendTransferStatus(`${hostname}: ${statusText}`);
      return statusText;
    }
    try {
      const payload = {
        letters: box.letters,
        colors: box.colors,
        delays: box.delays,
        color_modes: box.colorModes,
        color_palette_masks: box.colorPaletteMasks
      };
      const response = await fetch(`http://${ip}/updateAllLetters`, {
        method: "POST",
        mode: "cors",
        headers,
        body: JSON.stringify(payload)
      });
      statusText = response.ok ? "Uebertragen" : `Fehler (${response.status})`;
    } catch (error) {
      console.error("Fehler beim lokalen Uebertragen:", error);
      statusText = "Netzwerkfehler/CORS blockiert";
    }
    appendTransferStatus(`${hostname}: ${statusText}`);
    return statusText;
  }

  try {
    const response = await fetch("/transfer_box", {
      method: "POST",
      headers,
      body: JSON.stringify({ hostname })
    });

    if (!response.ok) {
      statusText = `❌ Fehler (${response.status})`;
    } else {
      const data = await response.json();
      statusText = data.status || "❌ Unerwartete Antwort";
    }
  } catch (error) {
    console.error("Fehler beim Übertragen:", error);
    statusText = "❌ Netzwerkfehler";
  }

  appendTransferStatus(`${hostname}: ${statusText}`);
  return statusText;
}

async function runTransferLoop() {
  while (transferring && !transferCancelled && Object.keys(transferPending).length > 0) {
    await fetchDevices();
    const connectedHostnames = new Set(connectedBoxes.map(box => box.hostname));

    for (const hostname of Object.keys(transferPending)) {
      if (transferCancelled) {
        break;
      }
      if (!connectedHostnames.has(hostname)) {
        continue;
      }

      const statusText = await transferBox(hostname);
      if (isTransferSuccess(statusText)) {
        delete transferPending[hostname];
        transferCompleted[hostname] = true;
        showSetup();
      }
      updateTransferButton();
    }

    if (Object.keys(transferPending).length > 0 && !transferCancelled) {
      appendTransferStatus(`Warte auf ${Object.keys(transferPending).length} noch nicht verbundene Box(en)...`);
      await new Promise(resolve => setTimeout(resolve, 2000));
    }
  }

  const wasCancelled = transferCancelled;
  transferring = false;
  transferCancelled = false;
  updateTransferButton();
  if (wasCancelled) {
    appendTransferStatus("Übertragung abgebrochen.");
  } else {
    appendTransferStatus("Übertragung abgeschlossen.");
  }
}

function transferAll() {
  if (transferring) {
    transferCancelled = true;
    return;
  }

  transferPending = {};
  transferCompleted = {};
  boxOrder.forEach(hostname => {
    transferPending[hostname] = true;
  });
  transferStatusLines = [];
  transferring = true;
  transferCancelled = false;
  showSetup();
  runTransferLoop();
}

async function reloadAll() {
  if (!window.confirm("Sollen alle Boxen wirklich neu eingelesen werden?")) {
    return;
  }

  const reloadButton = document.getElementById("reloadBtn");
  const originalLabel = reloadButton ? reloadButton.textContent : "";
  if (reloadButton) {
    reloadButton.disabled = true;
    reloadButton.textContent = "Lade Geräte...";
  }

  try {
    const response = await fetch("/reload_all", { method: "POST" });
    if (!response.ok) {
      alert("Fehler beim Neu-Laden der Boxen: " + response.statusText);
      return;
    }
    await fetchDevices();
    alert("Die Boxen wurden neu eingelesen.");
  } catch (error) {
    console.error("Fehler beim Neu-Laden:", error);
    alert("Netzwerkfehler beim Neu-Laden. Bitte erneut versuchen.");
  } finally {
    if (reloadButton) {
      reloadButton.textContent = originalLabel || "🔄 Boxen neu lernen";
      reloadButton.disabled = false;
    }
  }
}
